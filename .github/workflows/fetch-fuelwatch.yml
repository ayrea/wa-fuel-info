name: Update Data and Deploy

on:
  schedule:
    # Runs daily at 03:30, 09:30, 15:30, and 21:30 UTC
    - cron: "30 4/6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry-1.outputs.page_url || steps.deployment-retry-2.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fetch FuelWatch data
        run: npm run fetch-data

      - name: Check for changes
        id: changes
        working-directory: .
        run: |
          git add -A app/public/data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update FuelWatch data $(date -u +%Y-%m-%d)"
          git push

      - name: Build
        if: >-
          steps.changes.outputs.changed == 'true' ||
          github.event_name == 'workflow_dispatch'
        run: npm run build

      - name: Upload Pages artifact
        if: >-
          steps.changes.outputs.changed == 'true' ||
          github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - id: deployment
        if: >-
          steps.changes.outputs.changed == 'true' ||
          github.event_name == 'workflow_dispatch'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 1
        if: >-
          (steps.changes.outputs.changed == 'true' ||
          github.event_name == 'workflow_dispatch') &&
          steps.deployment.outcome == 'failure'
        run: sleep 15

      - id: deployment-retry-1
        if: >-
          (steps.changes.outputs.changed == 'true' ||
          github.event_name == 'workflow_dispatch') &&
          steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: >-
          (steps.changes.outputs.changed == 'true' ||
          github.event_name == 'workflow_dispatch') &&
          steps.deployment.outcome == 'failure' &&
          steps.deployment-retry-1.outcome == 'failure'
        run: sleep 15

      - id: deployment-retry-2
        if: >-
          (steps.changes.outputs.changed == 'true' ||
          github.event_name == 'workflow_dispatch') &&
          steps.deployment.outcome == 'failure' &&
          steps.deployment-retry-1.outcome == 'failure'
        uses: actions/deploy-pages@v4
