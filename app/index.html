<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Live Western Australia fuel prices from FuelWatch. Compare petrol, diesel and LPG prices across Perth suburbs and regional WA."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wa-fuel-info.com/" />
    <meta
      property="og:title"
      content="WA Fuel Info - Western Australia Fuel Prices"
    />
    <meta
      property="og:description"
      content="Live Western Australia fuel prices from FuelWatch. Compare petrol, diesel and LPG prices across Perth and regional WA."
    />
    <title>WA Fuel Info - Western Australia Fuel Prices</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('wa-fuel-theme')
          if (t === 'dark') document.documentElement.classList.add('dark')
          else if (t === 'light') document.documentElement.classList.remove('dark')
        } catch (_) {}
      })()
    </script>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          )
        }
      })(window.location)
    </script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
